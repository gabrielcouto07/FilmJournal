name: FilmJournalMobile
options:
  bundleIdPrefix: com.filmjournal.mobile
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "16.0"

configs:
  Debug: debug
  Release: release

packages:
  Kit:
    path: FilmJournalMobile/Packages/Kit
  CoordinatorKit:
    path: FilmJournalMobile/Packages/CoordinatorKit
  DesignKit:
    path: FilmJournalMobile/Packages/DesignKit

targets:
  FilmJournalMobile:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: FilmJournalMobile
        excludes:
          - "Packages/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.filmjournal.mobile
        PRODUCT_NAME: FilmJournal
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: FilmJournalMobile/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: Kit
      - package: CoordinatorKit
      - package: DesignKit

schemes:
  FilmJournalMobile:
    build:
      targets:
        FilmJournalMobile: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
